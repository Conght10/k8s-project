# Dev environment configuration for Inventory Service
replicaCount: 1

image:
  repository: htcong104/inventory-service

service:
  port: 8082

ingress:
  enabled: true
  hosts:
    - host: dev.inventory.local
      paths:
        - path: /
          pathType: Prefix

config:
  appMessage: "Inventory Service [DEV MODE]"
  featureFlag: false

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi
