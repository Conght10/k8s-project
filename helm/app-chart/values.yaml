# Các giá trị mặc định cho microservices
replicaCount: 1

imagePullSecrets: []

image:
  repository: my-app
  pullPolicy: Always # Để K8s luôn tải ảnh mới nhất từ Docker Hub
  tag: ""

service:
  type: ClusterIP
  port: 8080

config:
  appMessage: "Chào mừng bạn đến với Microservice sử dụng Helm!"
  featureFlag: false

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

ingress:
  enabled: true
  className: "nginx"
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local
