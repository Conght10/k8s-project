apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "microservice.fullname" . }}-config
  labels:
    {{- include "microservice.labels" . | nindent 4 }}
  application.yml: |
    server:
      port: {{ .Values.service.port }}
    custom:
      message: {{ .Values.config.appMessage | quote }}
      feature-flag: {{ .Values.config.featureFlag }}
