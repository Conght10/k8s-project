name: Java CI/CD with K8s

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        
    - name: Build with Maven
      run: mvn clean package -DskipTests

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push Gateway Service
      uses: docker/build-push-action@v5
      with:
        context: ./gateway-service
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/gateway-service:latest

    - name: Build and push Order Service
      uses: docker/build-push-action@v5
      with:
        context: ./order-service
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/order-service:latest

    - name: Set up Kubeconfig
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBECONFIG }}" > $HOME/.kube/config
        chmod 600 $HOME/.kube/config

    - name: Deploy to K8s
      run: |
        # Thay thế placeholder image trong file manifest nếu cần
        sed -i "s|image: gateway-service:latest|image: ${{ secrets.DOCKERHUB_USERNAME }}/gateway-service:latest|g" k8s/gateway-deployment.yaml
        sed -i "s|image: order-service:latest|image: ${{ secrets.DOCKERHUB_USERNAME }}/order-service:latest|g" k8s/order-deployment.yaml
        
        kubectl apply -f k8s/gateway-deployment.yaml
        kubectl apply -f k8s/order-deployment.yaml
        
        # Verify deployment
        kubectl rollout status deployment/gateway-service
        kubectl rollout status deployment/order-service
