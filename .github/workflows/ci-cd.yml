name: Java CI/CD with K8s and Helm

on:
  push:
    branches: [ "main", "uat", "dev" ]

jobs:
  check-changes:
    runs-on: self-hosted
    outputs:
      gateway: ${{ steps.filter.outputs.gateway }}
      order: ${{ steps.filter.outputs.order }}
      inventory: ${{ steps.filter.outputs.inventory }}
      env: ${{ steps.set-env.outputs.env }}
    steps:
    - uses: actions/checkout@v4
    
    - name: Set Environment
      id: set-env
      run: |
        if [ "${{ github.ref_name }}" == "main" ]; then
          echo "env=prod" >> $GITHUB_OUTPUT
        elif [ "${{ github.ref_name }}" == "uat" ]; then
          echo "env=uat" >> $GITHUB_OUTPUT
        else
          echo "env=dev" >> $GITHUB_OUTPUT
        fi

    - uses: dorny/paths-filter@v3
      id: filter
      with:
        filters: |
          gateway:
            - 'gateway-service/**'
            - 'pom.xml'
            - 'helm/app-chart/**'
            - 'k8s/gateway-deployment.yaml'
            - '.github/workflows/ci-cd.yml'
          order:
            - 'order-service/**'
            - 'pom.xml'
            - 'helm/app-chart/**'
            - '.github/workflows/ci-cd.yml'
          inventory:
            - 'inventory-service/**'
            - 'pom.xml'
            - 'helm/app-chart/**'
            - '.github/workflows/ci-cd.yml'

  build-and-deploy:
    needs: check-changes
    runs-on: self-hosted
    defaults:
      run:
        shell: bash
    steps:
    - uses: actions/checkout@v4
    
    - name: Debug Environment
      run: |
        echo "Current Workdir: $PWD"
        echo "Target Env: ${{ needs.check-changes.outputs.env }}"
        echo "Changes detected: Gateway=${{ needs.check-changes.outputs.gateway }}, Order=${{ needs.check-changes.outputs.order }}, Inventory=${{ needs.check-changes.outputs.inventory }}"

    - name: Build with Maven
      if: needs.check-changes.outputs.gateway == 'true' || needs.check-changes.outputs.order == 'true' || needs.check-changes.outputs.inventory == 'true'
      run: |
        MODULES=""
        if [ "${{ needs.check-changes.outputs.gateway }}" == "true" ]; then MODULES="$MODULES,gateway-service"; fi
        if [ "${{ needs.check-changes.outputs.order }}" == "true" ]; then MODULES="$MODULES,order-service"; fi
        if [ "${{ needs.check-changes.outputs.inventory }}" == "true" ]; then MODULES="$MODULES,inventory-service"; fi
        MODULES_STR=$(echo $MODULES | sed 's/^,//')
        echo "Building modules: $MODULES_STR"
        mvn clean package -pl $MODULES_STR -am -DskipTests

    - name: Log in to Docker Hub
      if: needs.check-changes.outputs.gateway == 'true' || needs.check-changes.outputs.order == 'true' || needs.check-changes.outputs.inventory == 'true'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push Order Service
      if: needs.check-changes.outputs.order == 'true'
      uses: docker/build-push-action@v5
      with:
        context: ./order-service
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/order-service:${{ needs.check-changes.outputs.env }}-${{ github.sha }}

    - name: Build and push Inventory Service
      if: needs.check-changes.outputs.inventory == 'true'
      uses: docker/build-push-action@v5
      with:
        context: ./inventory-service
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/inventory-service:${{ needs.check-changes.outputs.env }}-${{ github.sha }}

    - name: Build and push Gateway Service
      if: needs.check-changes.outputs.gateway == 'true'
      uses: docker/build-push-action@v5
      with:
        context: ./gateway-service
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/gateway-service:${{ needs.check-changes.outputs.env }}-${{ github.sha }}

    - name: Set up Kubeconfig
      run: |
        mkdir -p $HOME/.kube
        if [ -n "${{ secrets.KUBECONFIG }}" ]; then
          echo "${{ secrets.KUBECONFIG }}" > $HOME/.kube/config
          chmod 600 $HOME/.kube/config
        fi

    - name: Create Namespace and ImagePullSecret
      run: |
        # Tạo namespace trước
        kubectl create namespace ${{ needs.check-changes.outputs.env }} --dry-run=client -o yaml | kubectl apply -f -
        
        # Tạo hoặc cập nhật Secret để K8s có quyền PULL ảnh từ Docker Hub
        kubectl create secret docker-registry dockerhub-secret \
          --docker-server=https://index.docker.io/v1/ \
          --docker-username=${{ secrets.DOCKERHUB_USERNAME }} \
          --docker-password=${{ secrets.DOCKERHUB_TOKEN }} \
          --namespace ${{ needs.check-changes.outputs.env }} \
          --dry-run=client -o yaml | kubectl apply -f -

    - name: Deploy Order Service
      if: needs.check-changes.outputs.order == 'true'
      run: |
        # Ghép file values mặc định và file values môi trường
        helm upgrade --install order-app ./helm/app-chart \
          --namespace ${{ needs.check-changes.outputs.env }} \
          -f ./helm/app-chart/values.yaml \
          -f ./helm/app-chart/env/${{ needs.check-changes.outputs.env }}/order.yaml \
          --set image.tag=${{ needs.check-changes.outputs.env }}-${{ github.sha }} \
          --set "imagePullSecrets[0].name=dockerhub-secret" \
          --wait --timeout 5m

    - name: Deploy Inventory Service
      if: needs.check-changes.outputs.inventory == 'true'
      run: |
        helm upgrade --install inventory-app ./helm/app-chart \
          --namespace ${{ needs.check-changes.outputs.env }} \
          -f ./helm/app-chart/values.yaml \
          -f ./helm/app-chart/env/${{ needs.check-changes.outputs.env }}/inventory.yaml \
          --set image.tag=${{ needs.check-changes.outputs.env }}-${{ github.sha }} \
          --set "imagePullSecrets[0].name=dockerhub-secret" \
          --wait --timeout 5m

    - name: Deploy Gateway Service
      if: needs.check-changes.outputs.gateway == 'true'
      run: |
        # Tạm thời Gateway chưa dùng Helm đầy đủ, ta chuyển nó sang namespace môi trường
        sed -i '' "s|image: gateway-service:latest|image: ${{ secrets.DOCKERHUB_USERNAME }}/gateway-service:${{ needs.check-changes.outputs.env }}-${{ github.sha }}|g" k8s/gateway-deployment.yaml
        kubectl apply -f k8s/gateway-deployment.yaml -n ${{ needs.check-changes.outputs.env }}
